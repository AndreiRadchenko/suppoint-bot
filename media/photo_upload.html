<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фото комплекту</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
        }

        /* Camera — full-screen, always the main view */
        #camera-view {
            display: flex;
            position: fixed;
            inset: 0;
            flex-direction: column;
        }
        #camera-video {
            flex: 1;
            width: 100%;
            min-height: 0;
            object-fit: cover;
            display: block;
        }
        .camera-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 24px 16px;
            background: rgba(0,0,0,0.7);
        }
        #capture-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #fff;
            border: 5px solid rgba(255,255,255,0.4);
            cursor: pointer;
            flex-shrink: 0;
        }
        #capture-btn:disabled { opacity: 0.4; cursor: default; }
        #close-btn {
            color: #fff;
            background: transparent;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            width: 44px;
            text-align: center;
        }
        #camera-canvas { display: none; }

        /* Status overlay — shown during upload or on error */
        #status-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            padding: 24px;
            text-align: center;
        }
        #status-overlay.visible { display: flex; }
        #status-text { font-size: 18px; font-weight: 600; }
        .spinner { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Camera is the home screen -->
<div id="camera-view">
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="camera-canvas"></canvas>
    <div class="camera-controls">
        <button id="close-btn" title="Закрити">✕</button>
        <button id="capture-btn" title="Зробити фото" disabled></button>
        <div style="width:44px"></div><!-- spacer to centre the shutter -->
    </div>
</div>

<!-- Status / error overlay -->
<div id="status-overlay">
    <div id="status-text"></div>
    <button class="btn" id="retry-btn" style="display:none">🔄 Спробувати знову</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params  = new URLSearchParams(window.location.search);
    const rentId  = params.get('rent_id') || '';

    const cameraVideo   = document.getElementById('camera-video');
    const cameraCanvas  = document.getElementById('camera-canvas');
    const captureBtn    = document.getElementById('capture-btn');
    const closeBtn      = document.getElementById('close-btn');
    const statusOverlay = document.getElementById('status-overlay');
    const statusText    = document.getElementById('status-text');
    const retryBtn      = document.getElementById('retry-btn');

    let activeStream = null;

    function showStatus(html, withRetry = false) {
        statusText.innerHTML = html;
        retryBtn.style.display = withRetry ? '' : 'none';
        statusOverlay.classList.add('visible');
    }

    function hideStatus() {
        statusOverlay.classList.remove('visible');
    }

    async function startCamera() {
        hideStatus();
        captureBtn.disabled = true;
        try {
            if (!activeStream) {
                activeStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false,
                });
                cameraVideo.srcObject = activeStream;
            }
            // Must explicitly call play() — Android WebView does not auto-play on srcObject assignment.
            try { await cameraVideo.play(); } catch (_) {}
            captureBtn.disabled = false;
        } catch (err) {
            showStatus('📷 Дозвольте доступ до камери і спробуйте ще раз', true);
        }
    }

    function stopCamera() {
        if (activeStream) {
            activeStream.getTracks().forEach(t => t.stop());
            activeStream = null;
        }
        cameraVideo.srcObject = null;
        captureBtn.disabled = true;
    }

    closeBtn.addEventListener('click', () => tg.close());
    retryBtn.addEventListener('click', startCamera);

    captureBtn.addEventListener('click', () => {
        const w = cameraVideo.videoWidth  || 1280;
        const h = cameraVideo.videoHeight || 720;
        cameraCanvas.width  = w;
        cameraCanvas.height = h;
        cameraCanvas.getContext('2d').drawImage(cameraVideo, 0, 0, w, h);
        // Use synchronous toDataURL so uploadFile is called immediately within the
        // user-gesture context — Android WebView throttles fetch() from async callbacks.
        const dataUrl = cameraCanvas.toDataURL('image/jpeg', 0.92);
        const binary  = atob(dataUrl.split(',')[1]);
        const bytes   = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        uploadFile(new Blob([bytes], { type: 'image/jpeg' }), 'photo.jpg');
    });

    async function uploadFile(fileOrBlob, filename) {
        captureBtn.disabled = true;
        showStatus('<span class="spinner">⏳</span> Завантаження...');

        const MAX_SIZE = 10 * 1024 * 1024;
        if (fileOrBlob.size > MAX_SIZE) {
            showStatus('❌ Файл завеликий (максимум 10 МБ)', true);
            return;
        }

        const formData = new FormData();
        formData.append('photo', fileOrBlob, filename);
        formData.append('rent_id', rentId);
        formData.append('init_data', tg.initData);

        try {
            const resp   = await fetch('/api/upload-rent-photo', { method: 'POST', body: formData });
            const result = await resp.json();
            if (result.ok) {
                stopCamera();
                showStatus('✅ Фото надіслано!');
                setTimeout(() => tg.close(), 1200);
            } else {
                showStatus('❌ ' + (result.error || 'Помилка'), true);
            }
        } catch (err) {
            showStatus("❌ Помилка з'єднання", true);
        }
    }

    // Start camera immediately on load.
    startCamera();
</script>
</body>
</html>
